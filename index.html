<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クリエイティブ制作 タスクマネージャー</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--surface:#ffffff;--surface2:#f0f1f4;--surface3:#e5e7ec;
  --border:#d8dbe3;--border-light:#c8ccd6;
  --text:#1a1d27;--text-muted:#5f6577;--text-dim:#9099ad;
  --accent:#4f5bd5;--accent-light:#3b47c7;--accent-dim:rgba(79,91,213,.1);
  --plan:#4f5bd5;--actual-ok:#16a34a;--actual-late:#dc2626;--actual-early:#d97706;
  --danger:#dc2626;--danger-dim:rgba(220,38,38,.08);
  --success:#16a34a;--success-dim:rgba(22,163,74,.08);
  --warning:#d97706;--warning-dim:rgba(217,119,6,.08);
  --card-shadow:0 2px 12px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px;--radius-xs:4px;
  --sidebar-w:220px;
}
html{font-size:14px}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text);font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:var(--text);background:#fff;border:1px solid var(--border);border-radius:var(--radius-xs);padding:.3rem .5rem}
input:focus,select:focus{outline:none;border-color:var(--accent)}
a{color:var(--accent);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}

/* Layout */
.wrap{display:flex;flex-direction:column;height:100vh}
.header{background:linear-gradient(135deg,#4f5bd5,#3b47c7);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;gap:.75rem;height:44px;flex-shrink:0;z-index:200}
.header h1{font-size:.95rem;font-weight:700;white-space:nowrap;cursor:pointer;color:#fff}
.header h1 span{color:#ffd166}
.breadcrumb{font-size:.72rem;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:.3rem}
.breadcrumb .sep{color:rgba(255,255,255,.4)}
.breadcrumb a{color:#fff}
.header-spacer{flex:1}
.app{display:flex;flex:1;overflow:hidden}
.footer{height:24px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;font-size:.7rem;color:var(--text-dim);flex-shrink:0}

/* Sidebar */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-nav{padding:.4rem .4rem 0}
.snav{width:100%;padding:.4rem .6rem;border-radius:var(--radius-sm);font-size:.78rem;text-align:left;color:var(--text-muted);transition:background .12s;margin-bottom:1px;display:flex;align-items:center;gap:.35rem}
.snav:hover{background:var(--surface2);color:var(--text)}
.snav.active{background:var(--accent-dim);color:var(--accent)}
.sidebar-title{padding:.6rem .8rem .3rem;font-size:.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.sidebar-title button{font-size:.9rem;color:var(--text-muted);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-xs)}
.sidebar-title button:hover{background:var(--accent-dim);color:var(--accent-light)}
.sidebar-list{flex:1;overflow-y:auto;padding:0 .4rem .4rem}
.sitem{padding:.35rem .6rem;border-radius:var(--radius-sm);font-size:.78rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:.2rem;transition:background .12s;margin-bottom:1px}
.sitem:hover{background:var(--surface2)}
.sitem.active{background:var(--accent-dim);color:var(--accent)}
.sitem-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sitem-acts{display:flex;gap:1px;opacity:0;transition:opacity .12s}
.sitem:hover .sitem-acts{opacity:1}
.sitem-acts button{font-size:.65rem;padding:1px 4px;border-radius:var(--radius-xs);color:var(--text-muted)}
.sitem-acts button:hover{background:var(--surface3);color:var(--text)}
.sitem-acts .del:hover{color:var(--danger)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.tab-group{display:flex;background:var(--surface);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.tab-btn{padding:.3rem .75rem;font-size:.72rem;color:var(--text-muted);transition:all .12s;white-space:nowrap}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-btn:hover:not(.active){background:var(--surface2)}
.toolbar-spacer{flex:1}
.tbtn{padding:.3rem .6rem;border-radius:var(--radius-sm);font-size:.7rem;color:var(--text-muted);border:1px solid var(--border);transition:all .15s;display:flex;align-items:center;gap:.25rem}
.tbtn:hover{background:var(--surface2);color:var(--text)}

/* Kikaku tabs */
.ktabs{display:flex;align-items:center;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;overflow-x:auto;flex-shrink:0}
.ktabs .tab-btn{border-radius:0;border:none;border-bottom:2px solid transparent;padding:.4rem .75rem}
.ktabs .tab-btn.active{background:none;color:var(--accent-light);border-bottom-color:var(--accent)}

/* Summary */
.summary-bar{display:flex;gap:.5rem;padding:.5rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.25rem .6rem;font-size:.7rem;display:flex;align-items:center;gap:.3rem}
.chip .v{font-weight:700;font-size:.8rem}
.chip .v.blue{color:var(--accent-light)}
.chip .v.red{color:var(--actual-late)}
.chip .v.green{color:var(--actual-ok)}

/* View container */
.vc{flex:1;overflow:auto;padding:0}

/* Dashboard */
.dash{padding:1.25rem;overflow-y:auto}
.dash-title{font-size:1rem;font-weight:700;margin-bottom:1rem}
.dash-tabs{display:flex;gap:0;margin-bottom:1rem;background:var(--surface);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);width:fit-content}
.dash-tab{padding:.35rem .8rem;font-size:.75rem;color:var(--text-muted);transition:all .12s;white-space:nowrap;cursor:pointer}
.dash-tab.active{background:var(--accent);color:#fff}
.dash-tab:hover:not(.active){background:var(--surface2)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.75rem}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:all .15s}
.pcard:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--card-shadow)}
.pcard-name{font-size:.9rem;font-weight:700;margin-bottom:.4rem}
.pcard-sub{font-size:.68rem;color:var(--text-muted);margin-bottom:.5rem}
.pcard-stats{display:flex;gap:.5rem;margin-bottom:.5rem;font-size:.68rem;color:var(--text-muted);flex-wrap:wrap}
.pbar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .3s}
.pcard-foot{margin-top:.4rem;display:flex;justify-content:space-between;font-size:.65rem;color:var(--text-dim)}
.pcard-add{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--text-muted);transition:all .15s;min-height:120px}
.pcard-add:hover{border-color:var(--accent);color:var(--accent-light);background:var(--accent-dim)}

/* Info cards */
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.info-card h3{font-size:.85rem;font-weight:700;margin-bottom:.6rem;color:var(--text-muted)}
.info-item{font-size:.78rem;padding:.3rem 0;display:flex;align-items:center;gap:.5rem;border-bottom:1px solid var(--border)}
.info-item:last-child{border-bottom:none}

/* Table */
.tv{width:100%;border-collapse:collapse;font-size:.78rem}
.tv thead{position:sticky;top:0;z-index:10}
.tv th{background:var(--surface);border-bottom:2px solid var(--border);padding:.45rem .6rem;text-align:left;font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;font-weight:600;white-space:nowrap;user-select:none}
.tv td{border-bottom:1px solid var(--border);padding:.35rem .6rem;vertical-align:middle}
.tv tr:hover td{background:rgba(0,0,0,.03)}
.tv td.ed{cursor:pointer}
.tv td.ed:hover{background:var(--accent-dim)}
.tv td input,.tv td select{width:100%;padding:.2rem .35rem;font-size:.78rem}
.tv td input[type="date"]{width:auto;min-width:125px}
.tv td input[type="number"]{width:60px}
.td-plan{background:rgba(59,130,246,.06)}
.td-actual{background:rgba(34,197,94,.06)}
.td-actual-empty{background:rgba(0,0,0,.03)}
.td-late{background:rgba(239,68,68,.08)}
.td-today{box-shadow:inset 0 0 0 1px var(--warning)}
.sbadge{display:inline-block;padding:.12rem .45rem;border-radius:10px;font-size:.65rem;font-weight:600;cursor:pointer;user-select:none}
.sbadge.not_started{background:var(--surface3);color:var(--text-muted)}
.sbadge.in_progress{background:var(--accent-dim);color:var(--accent-light)}
.sbadge.submitted{background:var(--danger-dim);color:var(--danger);border:1px solid var(--danger)}
.sbadge.returned{background:var(--success-dim);color:var(--success);border:1px solid var(--success)}
.sbadge.completed{background:var(--success-dim);color:var(--success)}
.sbadge.on_hold{background:var(--warning-dim);color:var(--warning)}
.add-row{width:100%;padding:.5rem;font-size:.72rem;color:var(--text-muted);border-top:1px solid var(--border);text-align:center;transition:background .12s}
.add-row:hover{background:var(--surface2);color:var(--accent-light)}
.row-del{padding:1px 5px;border-radius:var(--radius-xs);font-size:.65rem;color:var(--text-muted)}
.row-del:hover{background:var(--surface3);color:var(--danger)}
.assignee-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle;border:1px solid rgba(0,0,0,.15)}

/* Schedule Matrix (Excel-sheet style) */
.sched-wrap{padding:.75rem 1rem;overflow:auto}
.sched{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:.75rem}
.sched th{background:var(--surface2);border:1px solid var(--border);padding:.4rem .6rem;font-size:.7rem;font-weight:700;color:var(--text-muted);text-align:center;position:sticky;top:0;z-index:10;white-space:nowrap;min-width:140px}
.sched th:first-child{min-width:90px;position:sticky;left:0;z-index:11;background:var(--surface2)}
.sched td{border:1px solid var(--border);padding:.2rem .35rem;vertical-align:top;min-height:28px}
.sched td:first-child{position:sticky;left:0;background:var(--surface);z-index:5;font-size:.68rem;font-weight:600;color:var(--text-muted);white-space:nowrap;text-align:center;padding:.35rem .5rem}
.sched tr.weekend td{background:rgba(0,0,0,.03)}
.sched tr.today td{background:rgba(239,68,68,.06)}
.sched tr.today td:first-child{color:var(--danger);font-weight:700}
.sched-task{padding:.3rem .5rem;border-radius:var(--radius-xs);margin-bottom:3px;font-size:.72rem;line-height:1.3;border-left:5px solid;cursor:pointer;transition:box-shadow .12s}
.sched-task:hover{box-shadow:0 0 0 1px var(--accent);z-index:1;position:relative}
.sched-task[draggable="true"]{cursor:grab}
.sched-task.dragging{opacity:.4;cursor:grabbing}
.sched td.drag-over{background:var(--accent-dim)!important;box-shadow:inset 0 0 0 2px var(--accent)}
.sched-task .st-assignee{font-size:.78rem;font-weight:700;margin-bottom:1px;display:flex;align-items:center;gap:4px}
.sched-task .st-assignee .assignee-dot{width:12px;height:12px;border:2px solid rgba(0,0,0,.15)}
.sched-task .st-name{font-size:.68rem;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-task .st-status{margin-top:2px}
.sched-task .st-who{font-size:.65rem;color:var(--text-muted);display:flex;align-items:center;gap:3px;margin-top:2px;flex-wrap:wrap}
.sched-task .st-who .assignee-dot{width:7px;height:7px}
/* Edit popover on sched */
.sched-popover{position:fixed;z-index:600;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.15);padding:.8rem;min-width:260px;max-width:320px}
.sched-popover .sp-row{margin-bottom:.6rem}
.sched-popover .sp-row label{display:block;font-size:.68rem;font-weight:600;color:var(--text-muted);margin-bottom:.15rem}
.sched-popover .sp-row select,.sched-popover .sp-row input{width:100%;font-size:.75rem;padding:.25rem .4rem}
.sched-popover .sp-actions{display:flex;gap:.3rem;justify-content:flex-end;margin-top:.6rem}
.sched-popover .sp-actions button{font-size:.72rem;padding:.25rem .6rem;border-radius:var(--radius-xs)}
.sched-section-hdr td{background:var(--surface2)!important;font-weight:700;font-size:.72rem;color:var(--accent-light);padding:.35rem .6rem}
.sched-section-hdr.sub td{background:var(--surface3)!important;color:var(--text);font-size:.7rem}

/* Members */
.members-view{padding:1.25rem;overflow-y:auto}
.member-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .8rem;display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.member-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.12)}
.member-info{flex:1}
.member-name{font-size:.82rem;font-weight:600}
.member-role{font-size:.68rem;color:var(--text-muted)}
.member-acts{display:flex;gap:4px}
.member-acts button{font-size:.68rem;padding:2px 6px;border-radius:var(--radius-xs);color:var(--text-muted);border:1px solid var(--border)}
.member-acts button:hover{background:var(--surface2);color:var(--text)}
.member-acts .del:hover{color:var(--danger);border-color:var(--danger)}
.color-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:.3rem}
.color-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.color-opt:hover{transform:scale(1.2)}
.color-opt.sel{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}

/* Project/Gou view */
.proj-view{padding:1.25rem;overflow-y:auto}
.proj-tabs{display:flex;gap:0;margin-bottom:1rem;background:var(--surface);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);width:fit-content}
.proj-tab{padding:.35rem .8rem;font-size:.72rem;color:var(--text-muted);transition:all .12s;white-space:nowrap}
.proj-tab.active{background:var(--accent);color:#fff}
.proj-tab:hover:not(.active){background:var(--surface2)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-hdr{padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h2{font-size:.9rem;font-weight:700}
.modal-hdr button{font-size:1rem;color:var(--text-muted);padding:2px}
.modal-hdr button:hover{color:var(--text)}
.modal-body{padding:1rem}
.modal-foot{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.4rem}
.modal-foot button{padding:.35rem .85rem;border-radius:var(--radius-sm);font-size:.78rem}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:var(--accent-light)}
.btn-s{border:1px solid var(--border);color:var(--text-muted)}
.btn-s:hover{background:var(--surface2)}
.field{margin-bottom:.8rem}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--text-muted);margin-bottom:.2rem}
.field input,.field select{width:100%;padding:.35rem .5rem}

/* Toast */
.toast-c{position:fixed;top:50px;right:1rem;z-index:600;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.toast{padding:.5rem .8rem;border-radius:var(--radius-sm);font-size:.78rem;opacity:0;transform:translateX(30px);transition:all .25s;pointer-events:auto;max-width:280px}
.toast.show{opacity:1;transform:translateX(0)}
.toast-ok{background:var(--success-dim);color:var(--success);border:1px solid var(--success)}
.toast-err{background:var(--danger-dim);color:var(--danger);border:1px solid var(--danger)}
.toast-info{background:var(--accent-dim);color:var(--accent-light);border:1px solid var(--accent)}

/* Reminder */
.remind-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-top:.75rem}
.remind-card h3{font-size:.85rem;font-weight:700;margin-bottom:.6rem;color:var(--text-muted)}
.remind-group{margin-bottom:.6rem}
.remind-group-hdr{font-size:.72rem;font-weight:700;padding:.3rem .4rem;border-radius:var(--radius-xs);margin-bottom:.3rem;display:flex;align-items:center;justify-content:space-between}
.remind-group-hdr.overdue{background:var(--danger-dim);color:var(--danger)}
.remind-group-hdr.prev-day{background:var(--warning-dim);color:var(--warning)}
.remind-group-hdr.in3d{background:rgba(249,115,22,.12);color:#f97316}
.remind-group-hdr.in1w{background:var(--accent-dim);color:var(--accent-light)}
.remind-item{font-size:.75rem;padding:.25rem .4rem;border-bottom:1px solid var(--border);line-height:1.4}
.remind-item:last-child{border-bottom:none}
.remind-copy{font-size:.6rem;padding:.12rem .35rem;border-radius:var(--radius-xs);border:1px solid currentColor;cursor:pointer;opacity:.7}
.remind-copy:hover{opacity:1}
.remind-copyall{margin-top:.5rem;padding:.3rem .6rem;border-radius:var(--radius-sm);font-size:.7rem;border:1px solid var(--border);color:var(--text-muted);width:100%}
.remind-copyall:hover{background:var(--accent-dim);color:var(--accent-light);border-color:var(--accent)}

/* CSV dropzone */
.csv-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;color:var(--text-muted);font-size:.78rem;transition:all .15s;cursor:pointer;margin-bottom:.75rem}
.csv-drop:hover,.csv-drop.dragover{border-color:var(--accent);color:var(--accent-light);background:var(--accent-dim)}
.csv-preview{max-height:180px;overflow:auto;margin:.5rem 0}
.csv-preview table{width:100%;border-collapse:collapse;font-size:.7rem}
.csv-preview th,.csv-preview td{border:1px solid var(--border);padding:.2rem .4rem;text-align:left}
.csv-preview th{background:var(--surface2);color:var(--text-muted)}
.csv-mapping{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin:.5rem 0;font-size:.72rem}
.csv-mapping label{color:var(--text-muted);display:flex;align-items:center;gap:.3rem}
.csv-mapping select{font-size:.7rem;padding:.2rem .3rem}

/* Project member checkboxes */
.pm-list{max-height:200px;overflow-y:auto}
.pm-item{display:flex;align-items:center;gap:.5rem;padding:.3rem .4rem;font-size:.78rem;border-bottom:1px solid var(--border);cursor:pointer}
.pm-item:hover{background:var(--surface2)}
.pm-item input[type="checkbox"]{width:auto;cursor:pointer}

/* Alert System */
.alert-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.alert-panel h3{font-size:.85rem;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.alert-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:.6rem;font-weight:700;padding:0 4px}
.alert-badge.red{background:var(--danger);color:#fff}
.alert-badge.yellow{background:var(--warning);color:#000}
.alert-badge.blue{background:var(--accent);color:#fff}
.alert-item{font-size:.75rem;padding:.35rem .5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;line-height:1.3}
.alert-item:last-child{border-bottom:none}
.alert-icon{font-size:.85rem;flex-shrink:0}
.alert-msg{flex:1}
.alert-copy{font-size:.6rem;padding:.12rem .35rem;border-radius:var(--radius-xs);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;white-space:nowrap}
.alert-copy:hover{background:var(--accent-dim);color:var(--accent-light);border-color:var(--accent)}
.deadline-table{width:100%;border-collapse:collapse;font-size:.72rem;margin-top:.4rem}
.deadline-table th{text-align:left;padding:.3rem .4rem;color:var(--text-muted);font-size:.65rem;border-bottom:1px solid var(--border)}
.deadline-table td{padding:.3rem .4rem;border-bottom:1px solid var(--border)}
.deadline-table .overdue-date{color:var(--danger);font-weight:700}

.hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
<header class="header">
  <h1 onclick="nav('dashboard')"><span>●</span> タスクマネージャー</h1>
  <div class="breadcrumb" id="bc"></div>
  <div class="header-spacer"></div>
</header>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-nav">
      <button class="snav active" id="navDash" onclick="nav('dashboard')">◫ ダッシュボード</button>
      <button class="snav" id="navMembers" onclick="nav('members')">👤 チームメンバー</button>
    </div>
    <div class="sidebar-title">プロジェクト<button onclick="showNewProjectModal()" title="新規プロジェクト">＋</button></div>
    <div class="sidebar-list" id="projList"></div>
  </aside>
  <div class="main">
    <div class="toolbar hidden" id="toolbar">
      <div class="tab-group">
        <button class="tab-btn active" data-v="table" onclick="switchView('table')">テーブル</button>
        <button class="tab-btn" data-v="schedule" onclick="switchView('schedule')">スケジュール表</button>
      </div>
      <div class="toolbar-spacer"></div>
      <div id="filterBar" style="display:flex;gap:.3rem;align-items:center;font-size:.7rem">
        <select id="filterStatus" onchange="applyFilters()" style="font-size:.7rem;padding:.2rem .35rem"><option value="">全ステータス</option><option value="not_started">未着手</option><option value="in_progress">進行中</option><option value="submitted">提出</option><option value="returned">お戻し</option><option value="on_hold">確認待ち</option><option value="completed">完了</option></select>
        <select id="filterAssignee" onchange="applyFilters()" style="font-size:.7rem;padding:.2rem .35rem"><option value="">全担当者</option></select>
        <input type="text" id="filterText" placeholder="🔍 検索..." oninput="applyFilters()" style="font-size:.7rem;padding:.2rem .35rem;width:100px">
      </div>
      <button class="tbtn" onclick="showCSVModal()">📥 CSV取込</button>
      <button class="tbtn" onclick="exportCSV()">📤 CSV出力</button>
      <button class="tbtn" onclick="showBackupModal()">💾 バックアップ</button>
    </div>
    <div class="summary-bar hidden" id="sumbar"></div>
    <div class="ktabs hidden" id="ktabs"></div>
    <div class="vc" id="vc">
      <div id="dashArea"></div>
      <div id="projArea" class="hidden"></div>
      <div id="gouArea" class="hidden"></div>
      <div id="kikakuArea" class="hidden"><div id="viewContent"></div></div>
      <div id="membersArea" class="hidden"></div>
    </div>
  </div>
</div>
<footer class="footer"><span id="lastSave">未保存</span></footer>
</div>
<div class="modal-bg hidden" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBox"></div></div>
<div class="toast-c" id="toastC"></div>

<script>
(function(){
"use strict";

/* ===== CONSTANTS ===== */
var SK='creative-task-mgr-v3';
var SL=['not_started','in_progress','submitted','returned','on_hold','completed'];
var SLA={not_started:'未着手',in_progress:'進行中',submitted:'提出',returned:'お戻し',on_hold:'確認待ち',completed:'完了'};
var ROLES=['director','writer','designer','editor','camera','sales','other'];
var RLAB={director:'ディレクター',writer:'ライター',designer:'デザイナー',editor:'編集',camera:'カメラマン',sales:'営業',other:'その他'};
var COLORS=['#FF3B30','#007AFF','#34C759','#FF9500','#AF52DE','#00C7BE','#FFD60A','#FF2D55','#5856D6','#64D2FF'];
var ROLE_COLORS={director:'#FF3B30',writer:'#007AFF',designer:'#AF52DE',editor:'#34C759',camera:'#FF9500',sales:'#00C7BE',other:'#8b8fa8'};
var FMT14=[
  {n:'企画案提出',h:8},{n:'情報収集',h:16},{n:'台割確定',h:4},{n:'構成案提出',h:8},
  {n:'取材・素材収集',h:24},{n:'執筆・制作',h:40},{n:'初校提出',h:8},
  {n:'初校確認（クライアント）',h:16},{n:'デスクチェック',h:4},{n:'再校提出',h:8},
  {n:'校閲実施',h:8},{n:'色校提出',h:4},{n:'校了',h:2},{n:'印刷入稿',h:4}
];

/* ===== UTIL ===== */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function escH(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function todayS(){var d=new Date(),m=d.getMonth()+1,dd=d.getDate();return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dd<10?'0'+dd:dd)}
function parseD(s){if(!s)return null;var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmtD(d){if(!d)return'';var m=d.getMonth()+1,dd=d.getDate();return(m<10?'0'+m:m)+'/'+(dd<10?'0'+dd:dd)}
function fmtISO(d){if(!d)return'';var y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();return y+'-'+(m<10?'0'+m:m)+'-'+(dd<10?'0'+dd:dd)}
function addD(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r}
function diffD(a,b){return Math.round((b-a)/864e5)}
function doff(base,n){return fmtISO(addD(parseD(base),n))}
function p2(n){return n<10?'0'+n:''+n}

/* ===== STATE ===== */
var S;
function save(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}updateSaveTs()}
function load(){
  try{var d=localStorage.getItem(SK);if(d){S=JSON.parse(d);migrate();return true}}catch(e){}
  return false;
}
function updateSaveTs(){var el=document.getElementById('lastSave');if(!el)return;var n=new Date();el.textContent='最終保存: '+n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate())+' '+p2(n.getHours())+':'+p2(n.getMinutes())}

/* ===== MIGRATION (3-tier → 4-tier) ===== */
function migrate(){
  if(!S.projects)return;
  var changed=false;
  S.projects.forEach(function(p){
    // If project has kikakus directly (old 3-tier), convert to 4-tier
    if(p.kikakus&&!p.gous){
      p.gous=[{id:uid(),name:'デフォルト号',kikakus:p.kikakus}];
      delete p.kikakus;
      changed=true;
    }
    if(!p.gous)p.gous=[];
    if(!p.members)p.members=[];
  });
  if(!S.activeGouId)S.activeGouId=null;
  if(changed)save();
}

/* ===== FACTORY ===== */
function mkProj(o){o=o||{};return{id:o.id||uid(),name:o.name||'',client:o.client||'',mediaType:o.mediaType||'shanaiho',members:o.members||[],gous:o.gous||[],createdAt:o.createdAt||new Date().toISOString()}}
function mkGou(o){o=o||{};return{id:o.id||uid(),name:o.name||'',kikakus:o.kikakus||[]}}
function mkKikaku(o){o=o||{};return{id:o.id||uid(),name:o.name||'',tasks:o.tasks||[]}}
function mkTask(o){o=o||{};return{id:o.id||uid(),name:o.name||'',planStart:o.planStart||todayS(),planEnd:o.planEnd||todayS(),actualStart:o.actualStart||'',actualEnd:o.actualEnd||'',status:o.status||'not_started',assignee:o.assignee||'',estimatedHours:o.estimatedHours||0,note:o.note||''}}
function mkMember(o){o=o||{};return{id:o.id||uid(),name:o.name||'',role:o.role||'other',color:o.color||COLORS[0]}}

/* ===== SAMPLE DATA ===== */
function createSample(){
  var base=todayS();var sb=doff(base,-14);
  var mems=[
    mkMember({name:'田中 太郎',role:'director',color:COLORS[0]}),
    mkMember({name:'鈴木 花子',role:'writer',color:COLORS[1]}),
    mkMember({name:'佐藤 健',role:'designer',color:COLORS[2]}),
    mkMember({name:'山田 美咲',role:'editor',color:COLORS[3]})
  ];
  var DIR=mems[0].name,WRI=mems[1].name,DES=mems[2].name,EDI=mems[3].name;

  function buildTasks(prefix,proc,dayStart,progDays){
    var ts=[],cd=dayStart;
    proc.forEach(function(st,idx){
      var dur=Math.max(1,Math.ceil(st[1]/8));
      var ps=doff(sb,cd),pe=doff(sb,cd+dur-1);
      var status='not_started',as='',ae='';
      if(cd+dur<=progDays){status='completed';as=doff(sb,cd);ae=doff(sb,cd+dur-1+(idx%4===0?1:0))}
      else if(cd<progDays){status='in_progress';as=doff(sb,cd)}
      ts.push(mkTask({name:prefix+'：'+st[0],planStart:ps,planEnd:pe,actualStart:as,actualEnd:ae,status:status,estimatedHours:st[1],assignee:st[2]}));
      cd+=dur;
    });
    return ts;
  }

  var full=[[' 企画案提出',8,DIR],[' 情報収集',16,WRI],[' 台割確定',4,DIR],[' 構成案提出',8,DIR],
    ['取材・素材収集',24,WRI],['執筆・制作',40,WRI],['初校提出',8,WRI],
    ['初校確認（クライアント）',16,DIR],['デスクチェック',4,EDI],['再校提出',8,DES],
    ['校閲実施',8,EDI],['色校提出',4,DES],['校了',2,EDI],['印刷入稿',4,DIR]];
  var cover=[['企画立案',6,DIR],['デザインラフ',8,DES],['デザイン制作',16,DES],
    ['初校確認',4,EDI],['修正対応',6,DES],['校了確認',2,EDI],
    ['入稿データ作成',4,DES],['色校確認',2,EDI],['納品',2,DIR]];

  var k1=mkKikaku({name:'表紙・目次'});k1.tasks=buildTasks('表紙・目次',cover,0,14);
  var k2=mkKikaku({name:'社長メッセージ'});k2.tasks=buildTasks('社長メッセージ',full,0,12);
  var k3=mkKikaku({name:'特集：新入社員紹介'});k3.tasks=buildTasks('特集：新入社員紹介',full,2,10);
  var k4=mkKikaku({name:'部署紹介：営業部'});k4.tasks=buildTasks('部署紹介：営業部',full,5,8);

  var gou=mkGou({name:'vol.42 夏号',kikakus:[k1,k2,k3,k4]});
  var proj=mkProj({name:'〇〇株式会社 社内報',client:'〇〇株式会社',mediaType:'shanaiho',members:mems.map(function(m){return m.id}),gous:[gou]});

  S={projects:[proj],members:mems,activeProjectId:proj.id,activeGouId:gou.id,activeKikakuId:k1.id,currentScreen:'dashboard',activeView:'table'};
  save();
}

/* ===== GETTERS ===== */
function getProj(){return S.projects.find(function(p){return p.id===S.activeProjectId})||null}
function getGou(){
  var p=getProj();if(!p||!p.gous.length)return null;
  return p.gous.find(function(g){return g.id===S.activeGouId})||p.gous[0];
}
function getKikaku(){
  var g=getGou();if(!g||!g.kikakus.length)return null;
  return g.kikakus.find(function(k){return k.id===S.activeKikakuId})||g.kikakus[0];
}
function getMember(name){return S.members.find(function(m){return m.name===name})||null}
function getRoleColor(mem){if(!mem)return'#8b8fa8';return ROLE_COLORS[mem.role]||'#8b8fa8'}
function getMemberById(id){return S.members.find(function(m){return m.id===id})||null}
function getProjMembers(p){
  if(!p||!p.members||!p.members.length)return S.members;
  return p.members.map(function(mid){return getMemberById(mid)}).filter(Boolean);
}

/* ===== NAVIGATION ===== */
function nav(scr,opts){
  opts=opts||{};
  if(opts.pid)S.activeProjectId=opts.pid;
  if(opts.gid)S.activeGouId=opts.gid;
  if(opts.kid)S.activeKikakuId=opts.kid;
  if(scr==='project'){var p=getProj();if(p&&p.gous.length){S.activeGouId=p.gous[0].id}else{S.activeGouId=null}S.activeKikakuId=null}
  if(scr==='gou'){var g=getGou();if(g&&g.kikakus.length)S.activeKikakuId=g.kikakus[0].id;else S.activeKikakuId=null}
  S.currentScreen=scr;save();renderAll();
}
window.nav=nav;

function switchView(v){
  S.activeView=v;save();
  document.querySelectorAll('.tab-btn[data-v]').forEach(function(b){b.classList.toggle('active',b.dataset.v===v)});
  renderView();
}
window.switchView=switchView;

/* ===== TOAST ===== */
function toast(msg,type){
  var c=document.getElementById('toastC');if(!c)return;
  var t=document.createElement('div');t.className='toast toast-'+(type||'info');t.textContent=msg;c.appendChild(t);
  requestAnimationFrame(function(){t.classList.add('show')});
  setTimeout(function(){t.classList.remove('show');setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t)},300)},2500);
}

/* ===== CLIPBOARD ===== */
function copyToClip(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){toast('コピーしました','ok')}).catch(function(){fallbackCopy(text)});
  } else {fallbackCopy(text)}
}
function fallbackCopy(text){
  var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('コピーしました','ok')}catch(e){toast('コピーに失敗しました','err')}
  document.body.removeChild(ta);
}

/* ===== MODAL ===== */
function showModal(html){var b=document.getElementById('modalBg'),m=document.getElementById('modalBox');if(b&&m){m.innerHTML=html;b.classList.remove('hidden')}}
function closeModal(){var b=document.getElementById('modalBg');if(b)b.classList.add('hidden')}
window.closeModal=closeModal;

/* ===== RENDER ALL ===== */
function renderAll(){
  var scr=S.currentScreen;
  var isK=scr==='kikaku';
  var tb=document.getElementById('toolbar'),sb=document.getElementById('sumbar'),kt=document.getElementById('ktabs');
  if(tb)tb.classList.toggle('hidden',!isK);
  if(sb)sb.classList.toggle('hidden',!isK);
  if(kt)kt.classList.toggle('hidden',!isK);

  ['dashArea','projArea','gouArea','kikakuArea','membersArea'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.classList.add('hidden');
  });

  var map={dashboard:'dashArea',project:'projArea',gou:'gouArea',kikaku:'kikakuArea',members:'membersArea'};
  var target=map[scr];
  if(target){var el=document.getElementById(target);if(el)el.classList.remove('hidden')}

  ['navDash','navMembers'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('active')});
  if(scr==='dashboard'){var nd=document.getElementById('navDash');if(nd)nd.classList.add('active')}
  if(scr==='members'){var nm=document.getElementById('navMembers');if(nm)nm.classList.add('active')}

  renderSidebar();renderBC();

  if(scr==='dashboard')renderDashboard();
  else if(scr==='project')renderProjectView();
  else if(scr==='gou')renderGouView();
  else if(scr==='kikaku'){renderSummary();renderKTabs();renderView();populateFilterAssignee()}
  else if(scr==='members')renderMembers();
}

/* ===== BREADCRUMB ===== */
function renderBC(){
  var el=document.getElementById('bc');if(!el)return;
  var scr=S.currentScreen;
  if(scr==='dashboard'){el.innerHTML='';return}
  if(scr==='members'){el.innerHTML='<a onclick="nav(\'dashboard\')">ダッシュボード</a><span class="sep">›</span>チームメンバー';return}
  var p=getProj();
  if(scr==='project'){el.innerHTML='<a onclick="nav(\'dashboard\')">ダッシュボード</a><span class="sep">›</span>'+escH(p?p.name:'');return}
  var g=getGou();
  if(scr==='gou'){
    el.innerHTML='<a onclick="nav(\'dashboard\')">ダッシュボード</a><span class="sep">›</span><a onclick="nav(\'project\',{pid:\''+((p&&p.id)||'')+'\'})">'+escH(p?p.name:'')+'</a><span class="sep">›</span>'+escH(g?g.name:'');return;
  }
  if(scr==='kikaku'){
    var k=getKikaku();
    el.innerHTML='<a onclick="nav(\'dashboard\')">ダッシュボード</a><span class="sep">›</span><a onclick="nav(\'project\',{pid:\''+((p&&p.id)||'')+'\'})">'+escH(p?p.name:'')+'</a><span class="sep">›</span><a onclick="nav(\'gou\',{pid:\''+((p&&p.id)||'')+'\',gid:\''+((g&&g.id)||'')+'\'})">'+escH(g?g.name:'')+'</a><span class="sep">›</span>'+escH(k?k.name:'');
    return;
  }
}

/* ===== SIDEBAR ===== */
function renderSidebar(){
  var el=document.getElementById('projList');if(!el)return;
  var h='';
  S.projects.forEach(function(p){
    var act=p.id===S.activeProjectId&&(S.currentScreen==='project'||S.currentScreen==='gou'||S.currentScreen==='kikaku');
    h+='<div class="sitem'+(act?' active':'')+'" onclick="nav(\'project\',{pid:\''+p.id+'\'})">';
    h+='<span class="sitem-name">'+escH(p.name)+'</span>';
    h+='<span class="sitem-acts"><button onclick="event.stopPropagation();renProjUI(\''+p.id+'\')" title="名前変更">✎</button>';
    h+='<button class="del" onclick="event.stopPropagation();delProjUI(\''+p.id+'\')" title="削除">✕</button></span></div>';
  });
  el.innerHTML=h;
}

/* ===== DASHBOARD ===== */
var dashTab='overview';
function switchDashTab(t){dashTab=t;renderDashboard()}
window.switchDashTab=switchDashTab;

function renderDashboard(){
  var el=document.getElementById('dashArea');if(!el)return;

  // Count alerts for badge
  var alertCount=getAlerts().length;

  var h='<div class="dash"><div class="dash-title">ダッシュボード</div>';
  h+='<div class="dash-tabs">';
  h+='<div class="dash-tab'+(dashTab==='overview'?' active':'')+'" onclick="switchDashTab(\'overview\')">📊 概要</div>';
  h+='<div class="dash-tab'+(dashTab==='alerts'?' active':'')+'" onclick="switchDashTab(\'alerts\')">⚠️ アラート';
  if(alertCount)h+=' <span class="alert-badge red" style="font-size:.55rem;min-width:14px;height:14px;margin-left:3px">'+alertCount+'</span>';
  h+='</div>';
  h+='<div class="dash-tab'+(dashTab==='remind'?' active':'')+'" onclick="switchDashTab(\'remind\')">🔔 リマインド</div>';
  h+='</div>';

  if(dashTab==='overview'){
    h+=renderDashOverview();
  } else if(dashTab==='alerts'){
    h+=renderAlertsHTML();
    h+=renderDeadlinesHTML();
  } else if(dashTab==='remind'){
    h+=renderRemindersHTML();
  }

  h+='</div>';
  el.innerHTML=h;
}

function renderDashOverview(){
  var h='';

  if(!S.members.length){
    h+='<div class="info-card" style="border-color:var(--accent);margin-bottom:1rem"><h3>👤 まずチームメンバーを登録しましょう</h3>';
    h+='<p style="font-size:.78rem;color:var(--text-muted);margin-bottom:.5rem">メンバーを登録すると、担当者のアサインや色分けができます。</p>';
    h+='<button class="btn-p" onclick="nav(\'members\')" style="font-size:.78rem;padding:.3rem .8rem">メンバーを登録する</button></div>';
  }

  h+='<div class="dash-grid">';
  S.projects.forEach(function(p){
    var tt=0,dn=0,ns=0;
    p.gous.forEach(function(g){g.kikakus.forEach(function(k){k.tasks.forEach(function(t){tt++;if(t.status==='completed')dn++;if(t.status==='not_started')ns++})})});
    var prog=tt?Math.round(dn/tt*100):0;
    var barClass=prog<30?'danger':prog<70?'warning':'success';
    var ip=tt-dn-ns;
    h+='<div class="pcard" onclick="nav(\'project\',{pid:\''+p.id+'\'})">';
    h+='<div class="pcard-name">'+escH(p.name)+'</div>';
    if(p.client)h+='<div class="pcard-sub">'+escH(p.client)+'</div>';
    h+='<div class="pcard-stats"><span>📁 '+p.gous.length+' 号</span><span>全 '+tt+' 工程</span><span style="color:var(--success)">完了 '+dn+'</span><span style="color:var(--accent-light)">進行中 '+ip+'</span></div>';
    h+='<div class="pbar"><div class="pbar-fill '+barClass+'" style="width:'+prog+'%;background:var(--'+barClass+')"></div></div>';
    h+='<div class="pcard-foot"><span>進捗 '+prog+'%</span></div></div>';
  });
  h+='<div class="pcard-add" onclick="showNewProjectModal()">＋ 新規プロジェクト</div>';
  h+='</div>';

  if(S.projects.length){
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1rem">';
    // Next actions
    h+='<div class="info-card"><h3>📋 次のアクション</h3>';
    var nextTasks=[];
    S.projects.forEach(function(p){p.gous.forEach(function(g){g.kikakus.forEach(function(k){k.tasks.forEach(function(t){
      if(t.status!=='completed'&&t.status!=='on_hold')nextTasks.push({t:t,pn:p.name,kn:k.name});
    })})})});
    nextTasks.sort(function(a,b){return(a.t.planEnd||'z').localeCompare(b.t.planEnd||'z')});
    var shown=nextTasks.slice(0,5);
    if(!shown.length)h+='<div style="font-size:.78rem;color:var(--text-dim)">全タスク完了！</div>';
    shown.forEach(function(item){
      var mem=getMember(item.t.assignee);var rc=getRoleColor(mem);
      h+='<div class="info-item">';
      if(mem)h+='<span class="assignee-dot" style="background:'+rc+'"></span>';
      h+='<span style="flex:1;font-size:.75rem">'+escH(item.t.name)+'</span>';
      h+='<span style="font-size:.65rem;color:var(--text-dim)">~'+escH(item.t.planEnd||'')+'</span></div>';
    });
    h+='</div>';

    // Recent updates
    h+='<div class="info-card"><h3>🕐 最近の更新</h3>';
    var recent=[];
    S.projects.forEach(function(p){p.gous.forEach(function(g){g.kikakus.forEach(function(k){k.tasks.forEach(function(t){
      if(t.actualEnd||t.actualStart)recent.push({t:t,kn:k.name});
    })})})});
    recent.sort(function(a,b){return(b.t.actualEnd||b.t.actualStart||'').localeCompare(a.t.actualEnd||a.t.actualStart||'')});
    var recentShown=recent.slice(0,5);
    if(!recentShown.length)h+='<div style="font-size:.78rem;color:var(--text-dim)">まだ更新はありません</div>';

/* ===== REMINDERS (4 groups per project) ===== */
function renderRemindersHTML(){
  var today=todayS();var todayD=parseD(today);
  var allReminders=[];

  S.projects.forEach(function(p){
    var groups={overdue:[],prevDay:[],in3d:[],in1w:[]};
    p.gous.forEach(function(g){g.kikakus.forEach(function(k){k.tasks.forEach(function(t){
      if(t.status==='completed')return;
      if(!t.planEnd)return;
      var endD=parseD(t.planEnd);
      var diff=diffD(todayD,endD);
      var who=t.assignee||'担当者未定';
      var tname=t.name;
      var msg;

      if(diff<0){
        msg=who+'さん、「'+tname+'」が'+Math.abs(diff)+'日超過しています。至急対応をお願いします。';
        groups.overdue.push({diff:diff,msg:msg});
      } else if(diff<=1){
        msg=who+'さん、「'+tname+'」の期限は'+(diff===0?'本日':'明日')+'です。';
        groups.prevDay.push({diff:diff,msg:msg});
      } else if(diff<=3){
        msg=who+'さん、「'+tname+'」の期限が'+diff+'日後（'+t.planEnd+'）です。';
        groups.in3d.push({diff:diff,msg:msg});
      } else if(diff<=7){
        msg=who+'さん、「'+tname+'」の期限が'+diff+'日後（'+t.planEnd+'）です。';
        groups.in1w.push({diff:diff,msg:msg});
      }
    })})});

    var total=groups.overdue.length+groups.prevDay.length+groups.in3d.length+groups.in1w.length;
    if(total>0)allReminders.push({proj:p,groups:groups,total:total});
  });

  if(!allReminders.length)return '';

  // Store for copy
  window._remindData=allReminders;

  var h='<div class="remind-card"><h3>🔔 リマインド文言</h3>';

  allReminders.forEach(function(pr,pi){
    h+='<div style="margin-bottom:.75rem">';
    h+='<div style="font-size:.78rem;font-weight:700;margin-bottom:.4rem;color:var(--text)">'+escH(pr.proj.name)+'</div>';

    var gDefs=[
      {key:'overdue',label:'🔴 期限超過',cls:'overdue',items:pr.groups.overdue},
      {key:'prevDay',label:'🟡 前日・当日',cls:'prev-day',items:pr.groups.prevDay},
      {key:'in3d',label:'🟠 3日以内',cls:'in3d',items:pr.groups.in3d},
      {key:'in1w',label:'🔵 1週間以内',cls:'in1w',items:pr.groups.in1w}
    ];

    gDefs.forEach(function(gd,gi){
      if(!gd.items.length)return;
      gd.items.sort(function(a,b){return a.diff-b.diff});
      h+='<div class="remind-group">';
      h+='<div class="remind-group-hdr '+gd.cls+'"><span>'+gd.label+' ('+gd.items.length+')</span>';
      h+='<button class="remind-copy" onclick="copyRemindGroup('+pi+',\''+gd.key+'\')">グループコピー</button></div>';
      gd.items.forEach(function(item){
        h+='<div class="remind-item">'+escH(item.msg)+'</div>';
      });
      h+='</div>';
    });
    h+='</div>';
  });

  h+='<button class="remind-copyall" onclick="copyAllReminds()">📋 全リマインド一括コピー</button>';
  h+='</div>';
  return h;
}

function copyRemindGroup(pi,key){
  if(!window._remindData||!window._remindData[pi])return;
  var items=window._remindData[pi].groups[key];
  if(!items||!items.length)return;
  copyToClip(items.map(function(i){return i.msg}).join('\n'));
}

function copyAllReminds(){
  if(!window._remindData)return;
  var lines=[];

function startEdit(td){
  if(td.querySelector('input,select'))return;
  var f=td.dataset.f,tid=td.dataset.t,tp=td.dataset.tp;
  var k=getKikaku();if(!k)return;
  var t=k.tasks.find(function(x){return x.id===tid});if(!t)return;
  var val=t[f]||'';

  var inp;
  if(tp==='assignee'){
    inp=document.createElement('select');
    inp.innerHTML='<option value="">— 未割当 —</option>';
    // Show project members only (or all if none set)
    var p=getProj();
    var pmems=getProjMembers(p);
    pmems.forEach(function(m){
      inp.innerHTML+='<option value="'+escH(m.name)+'"'+(m.name===val?' selected':'')+'>'+escH(m.name)+'</option>';
    });
  } else if(tp==='date'){
    inp=document.createElement('input');inp.type='date';inp.value=val;
  } else if(tp==='number'){
    inp=document.createElement('input');inp.type='number';inp.min='0';inp.step='0.5';inp.value=val;
  } else {
    inp=document.createElement('input');inp.type='text';inp.value=val;
  }
  td.textContent='';td.appendChild(inp);inp.focus();
  if(inp.select)inp.select();

  function commit(){
    var nv=inp.value.trim();
    if(tp==='number')nv=parseFloat(nv)||0;
    if(f==='assignee'&&nv!==t[f])recordAssigneeChange(t,t[f],nv);
    t[f]=nv;save();renderAll();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();inp.blur()}
    if(e.key==='Escape'){inp.value=t[f]||'';inp.blur()}
  });
}

/* ===== SCHEDULE MATRIX (Excel-sheet style: vertical=dates, horizontal=kikakus) ===== */
var DAYS_JP=['日','月','火','水','木','金','土'];

function buildScheduleMatrix(kikakus,allTasks){
  // Collect all dates
  var allD=[];
  allTasks.forEach(function(t){
    if(t.planStart)allD.push(parseD(t.planStart));
    if(t.planEnd)allD.push(parseD(t.planEnd));
    if(t.actualStart)allD.push(parseD(t.actualStart));
    if(t.actualEnd)allD.push(parseD(t.actualEnd));
  });
  if(!allD.length)return null;
  var minD=new Date(Math.min.apply(null,allD));
  var maxD=new Date(Math.max.apply(null,allD));
  minD.setHours(0,0,0,0);maxD.setHours(0,0,0,0);
  var totalDays=diffD(minD,maxD)+1;
  if(totalDays<1)totalDays=1;
  if(totalDays>200)totalDays=200;

  var todayISO=todayS();
  var todayD=parseD(todayISO);

  // Build date rows
  var dates=[];
  for(var di=0;di<totalDays;di++){
    var d=addD(minD,di);
    var iso=fmtISO(d);
    var dow=d.getDay();
    dates.push({date:d,iso:iso,dow:dow,label:(d.getMonth()+1)+'/'+d.getDate()+'('+DAYS_JP[dow]+')',isWeekend:dow===0||dow===6,isToday:iso===todayISO});
  }

  // Build lookup: for each kikaku, for each date, which tasks?
  var matrix={};
  kikakus.forEach(function(k){
    matrix[k.id]={};
    k.tasks.forEach(function(t){
      if(!t.planStart||!t.planEnd)return;
      var ps=parseD(t.planStart),pe=parseD(t.planEnd);
      var sd=diffD(minD,ps),ed=diffD(minD,pe);
      for(var di2=Math.max(0,sd);di2<=Math.min(totalDays-1,ed);di2++){
        var key=dates[di2].iso;
        if(!matrix[k.id][key])matrix[k.id][key]=[];
        matrix[k.id][key].push(t);
      }
    });
  });

  return {dates:dates,matrix:matrix,kikakus:kikakus};
}

function renderScheduleMatrixHTML(data){
  if(!data)return '<div style="padding:1rem;color:var(--text-muted)">日付データがありません</div>';

  var h='<div class="sched-wrap"><table class="sched"><thead><tr><th>日付</th>';
  data.kikakus.forEach(function(k){
    h+='<th>'+escH(k.name)+'</th>';
  });
  h+='</tr></thead><tbody>';

  data.dates.forEach(function(dr){
    var cls=dr.isToday?' today':(dr.isWeekend?' weekend':'');
    h+='<tr class="'+cls.trim()+'">';
    h+='<td>'+dr.label+'</td>';

    data.kikakus.forEach(function(k){
      var tasks=data.matrix[k.id][dr.iso]||[];
      h+='<td data-date="'+dr.iso+'" data-kid="'+k.id+'" ondragover="schedDragOver(event)" ondragleave="schedDragLeave(event)" ondrop="schedDrop(event)">';
      tasks.forEach(function(t){
        var mem=getMember(t.assignee);
        var roleColor=getRoleColor(mem);
        var bgAlpha='0.18';
        var borderColor=roleColor;
        var extraStyle='';
        if(t.status==='completed'){bgAlpha='0.06';extraStyle='text-decoration:line-through;opacity:.5;'}
        else if(t.status==='submitted'){bgAlpha='0.25';borderColor='#ef4444'}
        else if(t.status==='returned'){bgAlpha='0.25';borderColor='#34d399'}
        else if(t.status==='on_hold'){bgAlpha='0.10';borderColor='#fbbf24'}

        h+='<div class="sched-task" draggable="true" data-tid="'+t.id+'" onclick="openSchedEdit(this,\''+t.id+'\')" ondragstart="schedDragStart(event,\''+t.id+'\')" ondragend="schedDragEnd(event)" style="border-left-color:'+borderColor+';background:'+roleColor.slice(0,7)+hexAlpha(bgAlpha)+';'+extraStyle+'">';

        // Assignee line (big & prominent)
        h+='<div class="st-assignee">';
        if(mem){
          h+='<span class="assignee-dot" style="background:'+roleColor+'"></span>';
          h+='<span style="color:'+roleColor+'">'+escH(t.assignee)+'</span>';
        } else {

function handleCSVFile(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var buf=new Uint8Array(e.target.result);
    var text;
    // Try UTF-8 first
    try{
      text=new TextDecoder('utf-8',{fatal:true}).decode(buf);
    }catch(err){
      // Fallback to Shift_JIS
      try{text=new TextDecoder('shift_jis').decode(buf)}catch(err2){text=new TextDecoder('utf-8').decode(buf)}
    }
    parseCSVText(text);
  };
  reader.readAsArrayBuffer(file);
}
window.handleCSVFile=handleCSVFile;

function parseCSVText(text){
  var lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(function(l){return l.trim()});
  if(!lines.length){toast('CSVが空です','err');return}
  csvHeaders=parseCSVLine(lines[0]);
  csvData=[];
  for(var i=1;i<lines.length;i++){
    csvData.push(parseCSVLine(lines[i]));
  }
  renderCSVPreview();
}

function parseCSVLine(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(inQ){
      if(c==='"'&&i+1<line.length&&line[i+1]==='"'){cur+='"';i++}
      else if(c==='"')inQ=false;
      else cur+=c;
    } else {
      if(c==='"')inQ=true;
      else if(c===','){result.push(cur.trim());cur=''}
      else cur+=c;
    }
  }
  result.push(cur.trim());
  return result;
}

function autoMapColumns(isDaiwari){
  var mappings=isDaiwari?
    [{id:'csvMapKikaku',keys:['企画','名前','name']},{id:'csvMapPages',keys:['ページ','page']},{id:'csvMapAssignee',keys:['担当','assignee']},{id:'csvMapNote',keys:['備考','note','メモ']}]:
    [{id:'csvMapKikaku',keys:['企画','name']},{id:'csvMapTask',keys:['工程','タスク','task']},{id:'csvMapStart',keys:['開始','start','予定開始']},{id:'csvMapEnd',keys:['終了','end','予定終了']},{id:'csvMapAssignee',keys:['担当','assignee']}];

  mappings.forEach(function(map){

    csvHeaders.forEach(function(hd,i){

function applyCSV(){
  if(!csvData||!csvData.length){toast('CSVデータがありません','err');return}
  var g=getGou();if(!g){toast('号を選択してください','err');return}

  var type=document.getElementById('csvType');
  var isD=type&&type.value==='daiwari';

  if(isD){
    var kiIdx=parseInt((document.getElementById('csvMapKikaku')||{}).value);
    if(kiIdx<0){toast('企画名列を指定してください','err');return}
    var noteIdx=parseInt((document.getElementById('csvMapNote')||{}).value);
    var assIdx=parseInt((document.getElementById('csvMapAssignee')||{}).value);
    var count=0;
    csvData.forEach(function(row){
      var kname=row[kiIdx];if(!kname)return;
      var k=mkKikaku({name:kname});
      // Add default FMT tasks
      var today2=todayS();var day2=0;
      FMT14.forEach(function(f){
        var dur=Math.max(1,Math.ceil(f.h/8));
        var tsk=mkTask({name:f.n,planStart:doff(today2,day2),planEnd:doff(today2,day2+dur-1),estimatedHours:f.h});
        if(assIdx>=0&&row[assIdx])tsk.assignee=row[assIdx];
        k.tasks.push(tsk);
        day2+=dur;
      });
      g.kikakus.push(k);count++;
    });
    save();closeModal();renderAll();
    toast(count+'件の企画を取り込みました','ok');
  } else {
    var kiIdx2=parseInt((document.getElementById('csvMapKikaku')||{}).value);
    var tkIdx=parseInt((document.getElementById('csvMapTask')||{}).value);
    var stIdx=parseInt((document.getElementById('csvMapStart')||{}).value);
    var enIdx=parseInt((document.getElementById('csvMapEnd')||{}).value);
    var asIdx2=parseInt((document.getElementById('csvMapAssignee')||{}).value);
    if(tkIdx<0){toast('工程名列を指定してください','err');return}

    var kikakuMap={};
    csvData.forEach(function(row){
      var kname=(kiIdx2>=0?row[kiIdx2]:'')||'インポート企画';
      var tname=row[tkIdx];if(!tname)return;
      if(!kikakuMap[kname])kikakuMap[kname]=[];
      var tsk=mkTask({name:tname});
      if(stIdx>=0&&row[stIdx])tsk.planStart=normalizeDate(row[stIdx]);
      if(enIdx>=0&&row[enIdx])tsk.planEnd=normalizeDate(row[enIdx]);
      if(asIdx2>=0&&row[asIdx2])tsk.assignee=row[asIdx2];
      kikakuMap[kname].push(tsk);
    });

    var count2=0;
    Object.keys(kikakuMap).forEach(function(kname){
      var existing=g.kikakus.find(function(k){return k.name===kname});
      if(existing){
        kikakuMap[kname].forEach(function(t){existing.tasks.push(t)});
      } else {
        var k2=mkKikaku({name:kname,tasks:kikakuMap[kname]});
        g.kikakus.push(k2);
      }
      count2+=kikakuMap[kname].length;
    });
    save();closeModal();renderAll();
    toast(count2+'件のタスクを取り込みました','ok');
  }
}
window.applyCSV=applyCSV;

function normalizeDate(s){
  if(!s)return todayS();
  // Support: YYYY/MM/DD, YYYY-MM-DD, MM/DD, M/D
  s=s.replace(/\//g,'-');
  var parts=s.split('-');
  if(parts.length===3)return parts[0]+'-'+p2(parseInt(parts[1]))+'-'+p2(parseInt(parts[2]));
  if(parts.length===2){var y=new Date().getFullYear();return y+'-'+p2(parseInt(parts[0]))+'-'+p2(parseInt(parts[1]))}
  return todayS();
}

/* ===== ALERT SYSTEM (FR-05) ===== */
var ALERT_TYPES={
  overdue:{icon:'🔴',label:'遅延',severity:'critical'},
  onHoldLong:{icon:'🟡',label:'長期保留',severity:'warning'},
  overload:{icon:'🟠',label:'過負荷',severity:'warning'},
  dueThisWeek:{icon:'🔵',label:'今週期限',severity:'info'}
};

function getAlerts(){
  var today=todayS();var todayD=parseD(today);
  var alerts=[];
  // Get this week's end (Sunday)
  var weekEnd=addD(todayD,7-todayD.getDay());

  // Per-task alerts
  S.projects.forEach(function(p){
    p.gous.forEach(function(g){g.kikakus.forEach(function(k){k.tasks.forEach(function(t){
      if(t.status==='completed')return;
      var context=p.name+' / '+g.name+' / '+k.name;

      // Overdue
      if(t.planEnd&&t.status!=='completed'){
        var endD=parseD(t.planEnd);
        var diff=diffD(todayD,endD);
        if(diff<0){
          alerts.push({type:'overdue',task:t,context:context,days:Math.abs(diff),
            msg:escH((t.assignee||'担当者未定')+'さん、「'+t.name+'」が'+Math.abs(diff)+'日超過しています。至急対応をお願いします。'),
            reminder:'【リマインド】'+t.name+'の期限が'+Math.abs(diff)+'日超過しています。対象: '+context+'。至急ご確認ください。'
          });
        }
        // Due this week
        else if(diff<=7&&diff>0){
          alerts.push({type:'dueThisWeek',task:t,context:context,days:diff,
            msg:escH((t.assignee||'担当者未定')+'さん、「'+t.name+'」の期限が'+diff+'日後です。'),
            reminder:'【期限間近】'+t.name+'の期限が'+diff+'日後（'+t.planEnd+'）です。対象: '+context+'。進捗をご確認ください。'
          });
        }
      }

      // Long hold
      if(t.status==='on_hold'&&t.actualStart){
        var holdDays=diffD(parseD(t.actualStart),todayD);
        if(holdDays>=7){
          alerts.push({type:'onHoldLong',task:t,context:context,days:holdDays,
            msg:escH('「'+t.name+'」が'+holdDays+'日間保留中です。'),
            reminder:'【確認依頼】'+t.name+'が'+holdDays+'日間保留中です。対象: '+context+'。ステータスをご確認ください。'
          });
        }
      }
    })})});
  });

  // Overload check (weekly hours per member)
  var memberHours={};
  S.projects.forEach(function(p){
    p.gous.forEach(function(g){g.kikakus.forEach(function(k){k.tasks.forEach(function(t){
      if(t.status==='in_progress'&&t.assignee&&t.estimatedHours){
        if(!memberHours[t.assignee])memberHours[t.assignee]=0;
        memberHours[t.assignee]+=t.estimatedHours;
      }
    })})});
  });
  Object.keys(memberHours).forEach(function(name){
    if(memberHours[name]>40){
      alerts.push({type:'overload',task:null,context:'',days:0,
        msg:escH(name+'さんの稼働が上限超過: '+memberHours[name]+'h'),
        reminder:'【稼働注意】'+name+'さんの稼働が上限超過しています。現在の合計: '+memberHours[name]+'h。タスクの再配分をご検討ください。'
      });
    }
  });

  // Sort: overdue first, then hold, then overload, then due
  var order={overdue:0,onHoldLong:1,overload:2,dueThisWeek:3};
  alerts.sort(function(a,b){return(order[a.type]||9)-(order[b.type]||9)||(b.days-a.days)});
  return alerts;
}

function renderAlertsHTML(){
  var alerts=getAlerts();
  if(!alerts.length)return '';

  var critical=alerts.filter(function(a){return a.type==='overdue'}).length;
  var warning=alerts.filter(function(a){return a.type==='onHoldLong'||a.type==='overload'}).length;

  var h='<div class="alert-panel"><h3>⚠️ アラート ';
  if(critical)h+='<span class="alert-badge red">'+critical+'</span> ';
  if(warning)h+='<span class="alert-badge yellow">'+warning+'</span> ';
  h+='<span class="alert-badge blue">'+alerts.length+'</span>';
  h+='</h3>';

  var shown=alerts.slice(0,15);
  shown.forEach(function(a,i){
    var at=ALERT_TYPES[a.type];
    h+='<div class="alert-item">';
    h+='<span class="alert-icon">'+at.icon+'</span>';
    h+='<span class="alert-msg">'+a.msg;
    if(a.context)h+=' <span style="font-size:.6rem;color:var(--text-dim)">'+escH(a.context)+'</span>';
    h+='</span>';
    h+='<button class="alert-copy" onclick="copyToClip(window._alerts['+i+'].reminder)">コピー</button>';
    h+='</div>';
  });
  if(alerts.length>15)h+='<div style="font-size:.65rem;color:var(--text-dim);padding:.3rem .5rem">...他 '+(alerts.length-15)+' 件</div>';

  h+='<button class="remind-copyall" onclick="copyAllAlerts()" style="margin-top:.5rem">📋 全アラート一括コピー</button>';
  h+='</div>';

  window._alerts=alerts;
  return h;
}

function copyAllAlerts(){
  if(!window._alerts)return;

}

function renderDeadlinesHTML(){
  var today=todayS();var todayD=parseD(today);
  var items=[];

    p.gous.forEach(function(g){g.kikakus.forEach(function(k){k.tasks.forEach(function(t){
      if(t.status==='completed')return;
      if(!t.planEnd)return;
      var diff=diffD(todayD,parseD(t.planEnd));
      if(diff<=7){
        items.push({t:t,pn:p.name,kn:k.name,gn:g.name,diff:diff,date:t.planEnd});
      }
    })})});
  });
  if(!items.length)return '';

  items.sort(function(a,b){return a.diff-b.diff});

  var overdueN=items.filter(function(i){return i.diff<0}).length;
  var h='<div class="alert-panel"><h3>📅 今週の期限 ';
  if(overdueN)h+='<span class="alert-badge red">超過'+overdueN+'</span> ';

  var showN=Math.min(items.length,20);
  for(var i=0;i<showN;i++){
    var it=items[i];
    var mem=getMember(it.t.assignee);
    var dateLabel=it.diff<0?fmtD(parseD(it.date))+' ('+Math.abs(it.diff)+'日超過)':fmtD(parseD(it.date));
    h+='<tr><td'+(it.diff<0?' class="overdue-date"':'')+'>'+dateLabel+'</td>';
    h+='<td>'+escH(it.t.name)+'</td>';
    h+='<td><span class="sbadge '+it.t.status+'">'+SLA[it.t.status]+'</span></td>';
    h+='<td>';
    if(mem)h+='<span class="assignee-dot" style="background:'+mem.color+'"></span>';
    h+=escH(it.t.assignee||'未割当')+'</td>';
    h+='<td style="font-size:.65rem;color:var(--text-dim)">'+escH(it.pn)+'</td></tr>';
  }
  h+='</tbody></table>';
  if(items.length>20)h+='<div style="font-size:.65rem;color:var(--text-dim);padding:.3rem">...他 '+(items.length-20)+' 件</div>';
  h+='</div>';
  return h;
}

function exportCSV(){
  var k=getKikaku();
  if(!k||!k.tasks.length){toast('エクスポートするタスクがありません','err');return}
  var g=getGou(),p=getProj();
  var bom='\uFEFF';
  var lines=['"工程名","担当者","予定開始","予定終了","実績開始","実績終了","工数(h)","ステータス","備考"'];
  k.tasks.forEach(function(t){
    lines.push([t.name,t.assignee||'',t.planStart||'',t.planEnd||'',t.actualStart||'',t.actualEnd||'',t.estimatedHours||0,SLA[t.status]||t.status,t.note||''].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"'}).join(','));
  });
  var blob=new Blob([bom+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  var fname=(p?p.name:'export')+'_'+(g?g.name:'')+'_'+(k?k.name:'')+'.csv';
  a.download=fname.replace(/[\/\\:*?"<>|]/g,'_');
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('CSVをエクスポートしました','ok');
}

/* ===== SCHEDULE DRAG & DROP ===== */
var _dragTid=null;

function schedDragStart(e,tid){
  _dragTid=tid;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',tid);
  setTimeout(function(){e.target.classList.add('dragging')},0);
}
window.schedDragStart=schedDragStart;

function schedDragEnd(e){
  e.target.classList.remove('dragging');
  _dragTid=null;
  // Clean up all drag-over highlights
  document.querySelectorAll('.drag-over').forEach(function(el){el.classList.remove('drag-over')});
}
window.schedDragEnd=schedDragEnd;

function schedDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  var td=e.target.closest('td[data-date]');
  if(td)td.classList.add('drag-over');
}
window.schedDragOver=schedDragOver;

function schedDragLeave(e){
  var td=e.target.closest('td[data-date]');
  if(td)td.classList.remove('drag-over');
}
window.schedDragLeave=schedDragLeave;

function schedDrop(e){
  e.preventDefault();
  var td=e.target.closest('td[data-date]');
  if(!td)return;
  td.classList.remove('drag-over');
  var newDate=td.dataset.date;
  var tid=e.dataTransfer.getData('text/plain')||_dragTid;
  if(!tid||!newDate)return;

  // Find the task
  var foundTask=null;
  S.projects.forEach(function(p){p.gous.forEach(function(g){g.kikakus.forEach(function(k){k.tasks.forEach(function(t){
    if(t.id===tid)foundTask=t;
  })})})});
  if(!foundTask)return;

  var t=foundTask;
  // Calculate the shift: difference between drop date and task's plan start
  var oldStart=parseD(t.planStart);
  var newStart=parseD(newDate);
  if(!oldStart||!newStart)return;
  var shift=diffD(oldStart,newStart);
  if(shift===0)return;

  // Shift both planStart and planEnd by the same amount
  var oldEnd=parseD(t.planEnd);
  t.planStart=fmtISO(addD(oldStart,shift));
  if(oldEnd)t.planEnd=fmtISO(addD(oldEnd,shift));

  // Also shift actual dates if they exist
  if(t.actualStart){var as=parseD(t.actualStart);if(as)t.actualStart=fmtISO(addD(as,shift))}
  if(t.actualEnd){var ae=parseD(t.actualEnd);if(ae)t.actualEnd=fmtISO(addD(ae,shift))}

  save();renderAll();
  toast('「'+t.name+'」を'+Math.abs(shift)+'日'+(shift>0?'後':'前')+'に移動しました','ok');
}
window.schedDrop=schedDrop;

/* ===== ASSIGNEE CHANGE HISTORY ===== */
function recordAssigneeChange(task,oldAssignee,newAssignee){
  if(!task.assigneeHistory)task.assigneeHistory=[];
  task.assigneeHistory.push({from:oldAssignee||'',to:newAssignee||'',timestamp:new Date().toISOString()});
}

/* ===== INIT ===== */
function init(){
  if(!load()){createSample()}
  renderAll();
}
init();

})();
